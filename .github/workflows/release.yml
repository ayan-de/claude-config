name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${process.env.PACKAGE_VERSION}`;
            const body = [
              "See the assets below to download and install this version.",
              "",
              "**Linux:** `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.AppImage` (any distro incl. Arch).",
              "**macOS:** `.dmg` universal binary (Intel + Apple Silicon).",
              "**Windows:** `.msi` or `.exe` (NSIS) installer.",
              "",
              `First-launch notes and requirements are in the [README](https://github.com/${context.repo.owner}/${context.repo.repo}#install).`,
            ].join("\n");

            // Reuse an existing draft for this tag if one already exists
            // (handles workflow re-runs on the same tag).
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = releases.data.find(r => r.tag_name === tag && r.draft);
            if (existing) {
              core.info(`Reusing existing draft release ${existing.id} for ${tag}`);
              return existing.id;
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Claude Config ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build ${{ matrix.platform.name }}
    needs: create-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ""
          - name: macos-universal
            os: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: "--target universal-apple-darwin"
          - name: windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            patchelf \
            file \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: Add macOS Intel target
        if: matrix.platform.name == 'macos-universal'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.tauri-args }}

  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.release_id),
              draft: false,
              prerelease: false,
            });

      # Trigger a rebuild of the marketing site (claudeconfig.ayande.xyz on
      # Vercel). Its download URLs, sizes, and checksums are synced from this
      # repo's Releases API at build time, so it must rebuild after publish.
      # Set VERCEL_DEPLOY_HOOK_URL in repo Settings → Secrets (create the hook
      # in Vercel → Project → Settings → Git → Deploy Hooks). Non-fatal if unset.
      - name: Rebuild marketing site
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL not set — skipping marketing-site rebuild."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$HOOK_URL")
          echo "Vercel deploy hook responded with HTTP $code"
          case "$code" in
            2*) echo "Marketing-site rebuild triggered." ;;
            *)  echo "::warning::Deploy hook returned HTTP $code (release still published)." ;;
          esac
